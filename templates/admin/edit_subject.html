{% extends 'base.html' %}
{% block content %}

<h3>Edit Subject</h3>

<form method="post">
    {% csrf_token %}
    <input class="form-control mb-2" name="name" value="{{ subject.name }}">

    <select class="form-control mb-2" name="classroom">
        {% for c in classes %}
            <option value="{{ c.id }}" {% if c == subject.classroom %}selected{% endif %}>
                {{ c.name }}
            </option>
        {% endfor %}
    </select>

    <button class="btn btn-primary">Update</button>
</form>

{% endblock %}
