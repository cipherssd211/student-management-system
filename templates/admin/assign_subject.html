{% extends 'base.html' %}
{% block content %}

<h3>Assign Subjects to {{ teacher.user.username }}</h3>

<form method="post">
    {% csrf_token %}

    {% for subject in subjects %}
        <div class="form-check">
            <input class="form-check-input"
                   type="checkbox"
                   name="subjects"
                   value="{{ subject.id }}"
                   {% if subject in teacher.subjects.all %}checked{% endif %}>
            <label class="form-check-label">
                {{ subject.name }} ({{ subject.classroom.name }})
            </label>
        </div>
    {% endfor %}

    <br>
    <button class="btn btn-success">Save Subjects</button>
    <a href="{% url 'admin_teachers' %}" class="btn btn-secondary">Back</a>
</form>

{% endblock %}
