{% extends 'base.html' %}

{% block sidebar %}
{% include "includes/admin_sidebar.html" %}
{% endblock %}

{% block content %}

<style>
.report-card{
border-radius:14px;
padding:20px;
color:white;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}
</style>

<div class="container mt-4">

<h3 class="fw-bold mb-4"><i class="fa-solid fa-bug"></i> System Reports</h3>

<div class="row">

<div class="col-md-3 mb-3">
<div class="report-card bg-primary">
<small>Total Students</small>
<h3>{{ students }}</h3>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="report-card bg-success">
<small>Total Teachers</small>
<h3>{{ teachers }}</h3>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="report-card bg-warning text-dark">
<small>Average Marks</small>
<h3>{{ avg_marks }}</h3>
</div>
</div>

<div class="col-md-3 mb-3">
<div class="report-card bg-danger">
<small>Attendance %</small>
<h3>{{ attendance_percentage }}%</h3>
</div>
</div>

</div>

</div>

{% endblock %}
