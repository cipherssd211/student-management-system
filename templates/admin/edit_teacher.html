{% extends 'base.html' %}
{% block content %}

<h3>Edit Teacher</h3>

<form method="post">
    {% csrf_token %}
    <p><strong>{{ teacher.user.username }}</strong></p>
    <input class="form-control mb-2" name="subject" value="{{ teacher.subject }}">

    <button class="btn btn-primary">Update</button>
</form>

{% endblock %}
