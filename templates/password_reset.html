<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */

.container{
background:white;
padding:40px;
width:400px;
max-width:90%;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
text-align:center;
}

/* ICON */

.icon{
font-size:50px;
margin-bottom:10px;
}

/* TITLE */

h2{
margin-bottom:10px;
}

/* MESSAGE */

p{
color:#666;
font-size:14px;
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
transition:0.3s;
}

input:focus{
outline:none;
border-color:#0d6efd;
box-shadow:0 0 4px rgba(13,110,253,0.4);
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
transition:0.3s;
}

button:hover{
background:#084298;
}

/* LOGIN LINK */

.login-link{
margin-top:15px;
font-size:14px;
}

.login-link a{
color:#0d6efd;
text-decoration:none;
font-weight:600;
}

.login-link a:hover{
text-decoration:underline;
}

/* MOBILE */

@media(max-width:500px){

.container{
padding:25px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="icon">🔐</div>

<h2>Forgot Password</h2>

<p>Enter your email address and we will send you a link to reset your password.</p>

<form method="post">

{% csrf_token %}

{{ form.email }}

<button type="submit">Send Reset Link</button>

</form>

<div class="login-link">

<a href="/login/">← Back to Login</a>

</div>

</div>

</body>

</html>
