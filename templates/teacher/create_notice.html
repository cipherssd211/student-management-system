{% extends 'base.html' %}

{% block sidebar %}
{% include "includes/teacher_sidebar.html" %}
{% endblock %}

{% block content %}

<div class="container mt-4">

<div class="card shadow-sm border-0">

<!-- HEADER -->
<div class="card-header bg-white">

<h5 class="fw-bold mb-1">
<i class="fa-solid fa-message"></i> Post Notice
</h5>

<p class="text-muted mb-0">
This notice will be sent to students only
</p>

</div>

<!-- BODY -->
<div class="card-body">

<form method="post">
{% csrf_token %}

<!-- TITLE -->
<div class="mb-3">
<label class="form-label fw-semibold">Notice Title</label>
<input type="text" name="title" class="form-control" required>
</div>

<!-- MESSAGE -->
<div class="mb-3">
<label class="form-label fw-semibold">Notice Message</label>
<textarea name="message" rows="5" class="form-control" required></textarea>
</div>

<!-- HIDDEN TARGET -->
<input type="hidden" name="target_role" value="STUDENT">

<!-- BUTTONS -->
<div class="d-flex justify-content-end mt-4">

<a href="{% url 'teacher_dashboard' %}" class="btn btn-secondary me-2">
Cancel
</a>

<button type="submit" class="btn btn-primary">
<i class="fa-solid fa-message"></i> Send to Students
</button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
