{% extends 'base.html' %}

{% block sidebar %}
{% include "includes/teacher_sidebar.html" %}
{% endblock %}

{% block content %}

<style>
:root {
    --primary: #1e3c72;
    --secondary: #2a5298;
    --success: #28a745;
    --light-bg: #f4f6f9;
}

body {
    background: var(--light-bg);
}

/* CARD */
.custom-card {
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

/* HEADER */
.custom-header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    padding: 20px;
}

.custom-header h5 {
    margin: 0;
    font-weight: 600;
}

.custom-header p {
    font-size: 14px;
    opacity: 0.9;
}

/* FORM */
.form-control {
    border-radius: 10px;
    padding: 10px 12px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

.form-control:focus {
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px rgba(42,82,152,0.1);
}

/* LABEL */
.form-label {
    font-size: 14px;
    margin-bottom: 6px;
}

/* BUTTONS */
.btn-custom {
    border-radius: 10px;
    padding: 8px 18px;
    font-weight: 500;
    transition: 0.3s;
}

.btn-success {
    background: linear-gradient(135deg, #28a745, #20c997);
    border: none;
}

.btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 12px rgba(40,167,69,0.3);
}

.btn-secondary:hover {
    transform: translateY(-2px);
}

/* INPUT ICON */
.input-group-text {
    border-radius: 10px 0 0 10px;
    background: #f1f3f5;
    border: 1px solid #ddd;
}

.input-group .form-control {
    border-left: 0;
}
</style>

<div class="container mt-5">

<div class="card custom-card">

<!-- HEADER -->
<div class="custom-header">
    <h5>
        <i class="fa-solid fa-file-invoice"></i> Generate Student Result
    </h5>
    <p>Select student and term to generate result automatically</p>
</div>

<!-- BODY -->
<div class="card-body p-4">

<form method="POST">
{% csrf_token %}

<!-- STUDENT -->
<div class="mb-4">
    <label class="form-label fw-semibold">Select Student</label>

    <div class="input-group">
        <span class="input-group-text">
            <i class="fa-solid fa-user"></i>
        </span>

        <select name="student" class="form-control" required>
            <option value="">-- Choose Student --</option>
            {% for s in students %}
            <option value="{{ s.id }}">
                {{ s.application.full_name }} ({{ s.student_id }})
            </option>
            {% endfor %}
        </select>
    </div>
</div>

<!-- TERM -->
<div class="mb-4">
    <label class="form-label fw-semibold">Select Term</label>

    <div class="input-group">
        <span class="input-group-text">
            <i class="fa-solid fa-calendar"></i>
        </span>

        <select name="term" class="form-control" required>
            <option value="">-- Choose Term --</option>
            <option value="TERM1">First Term</option>
            <option value="TERM2">Second Term</option>
            <option value="FINAL">Final Result</option>
        </select>
    </div>
</div>

<!-- BUTTONS -->
<div class="d-flex justify-content-between align-items-center mt-4">

    <a href="{% url 'teacher_dashboard' %}" 
       class="btn btn-secondary btn-custom">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <button type="submit" class="btn btn-success btn-custom">
        <i class="fa-solid fa-file-circle-check"></i> Generate Result
    </button>

</div>

</form>

</div>

</div>

</div>

{% endblock %}
