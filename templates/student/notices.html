{% extends "base.html" %}
{% block sidebar %}
{% include "includes/student_sidebar.html" %}
{% endblock %}

{% block content %}

<h3 class="fw-bold mb-4"><i class="fa-solid fa-bell"></i> Notices</h3>

<div class="card">
<div class="card-body">

{% for notice in notices %}
<div class="mb-3 border-bottom pb-2">

<a href="{% url 'notice_detail' notice.id %}">
<strong>{{ notice.title }}</strong>
</a>

<small class="text-muted d-block">
{{ notice.created_at|date:"M d, Y" }}
</small>

</div>
{% empty %}
<p>No notices available</p>
{% endfor %}

</div>
</div>

{% endblock %}
