{% extends 'base.html' %}
{% block sidebar %}
{% include "includes/student_sidebar.html" %}
{% endblock %}
{% block content %}

<h3>My Attendance</h3>

<table class="table table-bordered">
<tr>
    <th>Date</th>
    <th>Status</th>
</tr>

{% for a in attendance %}
<tr>
    <td>{{ a.date }}</td>
    <td>{{ a.status|yesno:"Present,Absent" }}</td>
</tr>
{% empty %}
<tr><td colspan="2">No attendance data</td></tr>
{% endfor %}
</table>

{% endblock %}
