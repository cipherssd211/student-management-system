<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Reset Email Sent</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
text-align:center;
max-width:450px;
width:90%;
}

/* ICON */

.icon{
font-size:60px;
margin-bottom:15px;
color:#28a745;
}

/* TITLE */

h2{
margin-bottom:10px;
}

/* MESSAGE */

p{
color:#555;
line-height:1.5;
}

/* BUTTON */

.btn{
display:inline-block;
margin-top:25px;
padding:12px 20px;
background:#0d6efd;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:600;
transition:0.3s;
}

.btn:hover{
background:#084298;
}

/* MOBILE */

@media(max-width:500px){

.container{
padding:25px;
}

.icon{
font-size:50px;
}

}

</style>

</head>

<body>

<div class="container">

<div class="icon">✅</div>

<h2>Password Reset Email Sent</h2>

<p>
We have sent a password reset link to your email address.
<br><br>
Please check your inbox and follow the instructions to reset your password.
</p>

<a href="/login/" class="btn">Back to Login</a>

</div>

</body>

</html>
