<!DOCTYPE html>

<html>
<head>

<title>Forgot Password</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 6px 20px rgba(0,0,0,0.15);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#2a5298;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1e3c72;
}

</style>

</head>

<body>

<div class="container">

<h2>Reset Password</h2>

<p>Enter your email to reset your password.</p>

<form method="post">

{% csrf_token %}

<input type="email" name="email" placeholder="Enter your email" required>

<button type="submit">Send Reset Link</button>

</form>

</div>

</body>
</html>
